<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Empresas de Seguridad Privada</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Roboto',sans-serif;
    background:#ECEFF1;
}

/* =======================
      ENCABEZADO
======================= */

.logo{

    width:100%;

    background:#fff;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:22px 30px;

    box-shadow:
        0 4px 10px rgba(0,0,0,.14),
        0 12px 30px rgba(0,0,0,.12);

}

.logo img{

    width:100%;

    max-width:1150px;

    display:block;

}

/* =======================
      CONTENEDOR
======================= */

.wrapper{

    padding:30px 20px 40px;

}

.card{

    max-width:1180px;

    margin:auto;

    background:#fff;

    border-radius:8px;

    box-shadow:
        0 4px 10px rgba(0,0,0,.15),
        0 12px 30px rgba(0,0,0,.10);

}

.content{

    padding:45px 60px 70px;

}

/* =======================
      TITULO
======================= */

.title{

    display:flex;

    gap:18px;

    align-items:flex-start;

    margin-bottom:60px;

}

.check{

    color:#33C5AF;

    font-size:32px;

    margin-top:3px;

}

.title h1{

    color:#666;

    font-size:23px;

    font-weight:500;

    text-transform:uppercase;

    letter-spacing:.4px;

    line-height:1.3;

}

/* =======================
      DATOS
======================= */

.section{

    margin-bottom:60px;

}

.label{

    font-size:28px;

    font-weight:700;

    color:#222;

    margin-bottom:18px;

}

.value{

    font-size:46px;

    font-weight:300;

    color:#222;

    line-height:1.15;

}

.nowrap{

    white-space:nowrap;

}

/* =======================
      CELULAR
======================= */

@media(max-width:900px){

.logo{

padding:16px;

}

.wrapper{

padding:20px 12px;

}

.content{

padding:28px 24px 40px;

}

.title{

margin-bottom:40px;

}

.check{

font-size:28px;

}

.title h1{

font-size:18px;

}

.label{

font-size:20px;

}

.value{

font-size:22px;

white-space:nowrap;

}

.section{

margin-bottom:40px;

}

}

</style>

</head>

<body>

<div class="logo">
    <img src="logo-sonora.jpg" alt="Gobierno de Sonora">
</div>

<div class="wrapper">

<div class="card">

<div class="content">

<div class="title">

<div class="check">✔</div>

<h1>REGISTRO DE EMPRESAS DE SEGURIDAD PRIVADA</h1>

</div>

<div class="section">

<div class="label">
Empresa:
</div>

<div class="value nowrap">
Eduardo Acosta Sanchez
</div>

</div>

<div class="section">

<div class="label">
Número de autorización:
</div>

<div class="value">
LSP-R-2026-M-389
</div>

</div>

<div class="section">

<div class="label">
Fecha vigencia:
</div>

<div class="value">
31/Diciembre/2026
</div>

</div>

</div>

</div>

</div>

</body>
</html>
