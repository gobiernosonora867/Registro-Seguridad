<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Empresas de Seguridad Privada</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#eceff1;
    font-family:'Roboto',sans-serif;
    padding:45px 20px;
}

.card{

    max-width:1180px;

    margin:auto;

    background:white;

    border-radius:8px;

    box-shadow:
    0 2px 5px rgba(0,0,0,.15),
    0 8px 24px rgba(0,0,0,.08);

    overflow:hidden;

}

.header{

    text-align:center;

    padding:35px 45px 20px;

}

.header img{

    width:100%;

    max-width:980px;

    height:auto;

}

.divider{

    height:1px;

    background:#e5e5e5;

}

.content{

    padding:45px 60px 70px;

}

.title{

    display:flex;

    align-items:flex-start;

    gap:18px;

    margin-bottom:65px;

}

.check{

    color:#35C4AE;

    font-size:42px;

    margin-top:3px;

}

.title h1{

    color:#666;

    font-size:30px;

    font-weight:500;

    letter-spacing:.5px;

    text-transform:uppercase;

}

.section{

    margin-bottom:65px;

}

.label{

    font-size:28px;

    font-weight:700;

    color:#222;

    margin-bottom:18px;

}

.value{

    font-size:46px;

    font-weight:300;

    color:#222;

    line-height:1.18;

}

.nowrap{

    white-space:nowrap;

}

@media(max-width:900px){

.content{

padding:30px;

}

.title{

margin-bottom:40px;

}

.title h1{

font-size:22px;

}

.check{

font-size:30px;

}

.label{

font-size:22px;

}

.value{

font-size:30px;

white-space:normal;

}

}

</style>

</head>

<body>

<div class="card">

<div class="header">

<img src="images/logo-sonora.jpg" alt="Gobierno de Sonora">

</div>

<div class="divider"></div>

<div class="content">

<div class="title">

<div class="check">✔</div>

<h1>REGISTRO DE EMPRESAS DE SEGURIDAD PRIVADA</h1>

</div>

<div class="section">

<div class="label">
Empresa:
</div>

<div class="value nowrap">
Eduardo Acosta Sanchez
</div>

</div>

<div class="section">

<div class="label">
Número de autorización:
</div>

<div class="value">
LSP-R-2010-M-271
</div>

</div>

<div class="section">

<div class="label">
Fecha vigencia:
</div>

<div class="value">
31/Diciembre/2026
</div>

</div>

</div>

</div>

</body>
</html>
